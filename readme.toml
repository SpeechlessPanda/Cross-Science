[[courses]]
name = "走进量子世界"

[[courses.teachers]]
name = "周宇"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
- 这一门正如老师自己所说：就是一门福利课。四学分的跨专业课不费吹灰之力。
- 平时有小测和考勤，但是可以不用管，不扣平时分（因为根本就没有）。
- 课堂汇报只要是和量子力学相关的内容基本都是 30 分 / 29 分。
- 实验可以使用 AI，交了实验报告就是 20 分。
- 最后卷面 100 分折算成50分的考试也非常容易，老师最后会发两份PDF，只需要对着PDF里面的内容复习即可，掌握量子力学历史、布洛赫球、简单的量子计算就可以轻松过关。
"""
author = { name = "潜伏", link = "https://github.com/capoo-fan", date = "2026-01" }

[[courses]]
name = "理论力学"

[[courses.teachers]]
name = "凡友华、蔡坤"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
这一门课是比较硬核的力学课程，包括运动学、静力学和动力学，涉及了很多新的物理概念。作业题难度有点大，但如果能认真听老师讲解的例题以及善于使用工具的话也不是问题（画图很重要！）

虽然如此，考试非常简单。大部分直接考察基本概念，小部分计算题也不涉及复杂的分析，只需要套公式就可以（别被课本上复杂的例题吓到）。考试内容包括基础的运动学、刚体的复合运动、基础的静力学、刚体动力学、虚功原理、拉格朗日方程。只要掌握最基础的概念和公式，过这门四学分的跨专业课就不难。

没有考勤和汇报！
"""
author = { name = "lpf", link = "https://github.com/lpf123321", date = "2026-02" }

[[courses]]
name = "大学化学III"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
开课期间要求学生在 3 个模块中各选择一个化学实验完成，每个时长在 3 学时左右。难度整体都一般，还是挺有意思的（在本科期间有多少机会进入化学实验室呢？）。

没有期末考试，这是这门课对学生最友好的一点，学习压力会小很多。

总的来说，占用时间精力很少，性价比还是很高的。
"""
author = { name = "Maxwell Jay", link = "https://github.com/MaxwellJay256", date = "2023-09" }

[[courses]]
name = "波谱学原理与应用"

[[courses.teachers]]
name = "杨超"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
- 上课不考勤，偶尔会按点名表顺序抽人回答问题~~在后面的完全不用担心~~，但是习题课一定要去！
- 考试难度不大，老师上课很认真很亲切，讲解也很清楚，如果认真听的话一定可以学到东西。
- ppt 全英文且课后不发放ppt，期末考看 B 站的波谱学速成视频就够了。
- 课程作业每次只有一道题，上交方式为 QQ 群小程序上交。10min 可解决。
- 课程 pre 在每一小章节结束后的习题课上，形式为微信小程序“ OS.波谱学原理与应用”中的对应习题（按点名表序号选题）有半个小时的作答时间，只要讲出分析思路即可（1min 左右）~~实测用 AI 完全可以做完~~
"""
