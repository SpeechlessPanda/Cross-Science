course_name = "理学类跨专业课程"
course_code = "Cross-Science"
repo_type = "multi-project"
description = "本仓库包含理学院开设的数理类跨专业课程。"

[[courses]]
name = "数智结构概论"

[[courses.teachers]]
name = "蔡坤"

[[courses.teachers.reviews]]
content = "是一个有点保守的老师，用他自己的话来说也有点说什么比较不顾忌。上课时要注意保持本心，培养辩证思维能力（doge）。"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
- 每节课考勤，形式为课前扫码签到。按理来说可以签完到就溜，但是老师后面会有抽签提问环节，要是抽到了不在那节课考勤就算不在。
- 课程形式是上半节讲内容，下半节看视频，然后最后几分钟会根据视频内容提问。每节课都有课后作业，下星期的那天交，内容也是跟视频内容相关，大家大部分都是用电脑写好打印出来提交（因为真的很多）。
- 给分比较宽松，考勤和作业没问题的话都能过，我是A，不过好像作业有一定次数没交老师就会让助教挂你的科。
- 因为种种原因（老师体验感不太好），这门课貌似已成为绝版课程，个人觉得挺可惜，毕竟三分好水的跨专业也不多。
"""
author = { name = "SpeechlessPanda", link = "https://github.com/SpeechlessPanda", date = "2026-01" }

[[courses]]
name = "电动力学"

[[courses.teachers]]
name = "秦刚"

[[courses.sections]]
title = "课程概况"

[[courses.sections.items]]
content = """
- 每节课会有遍历点名，但是不会以此挂人。上课颇为硬核，且老师语速慢，吐字比较不清晰，所以很难听懂。
- 有四次作业，但是很简单，且此四次作业能决定大部分平时分。
- 24 春期末考为全选填，25 春期末考是五题大题，每道大题都是一个概念的简述，考试内容限于大物电磁学部分，具体可以见资料下载，捞的很狠（最后应该是零人挂科）。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2025-07" }

[[courses]]
name = "量子力学"

[[courses.teachers]]
name = "邓皓键"

[[courses.teachers.reviews]]
content = """
老师很友好，但是普通话有点不好，类似于外国人说中文，但是能听懂。
上课使用长江雨课堂点名，还会让助教在八点十分左右进行签到。课上不会管你在做什么，但是期末专门认识了几个听课比较认真的同学。
每节课进行板书，没有 PPT。前面部分和教材基本符合，后面量子计算没有教材，但是难度较低一点。期末考试，听讲＋做好作业很好过。
"""
author = { name = "Layaka", link = "", date = "2025-12" }

